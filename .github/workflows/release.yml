name: Release Desktop Apps

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v0.1.0, v1.2.3, etc.

# Least-privilege default: most jobs only read the repo. Write is granted
# per-job to the ones that create/upload the GitHub release.
permissions:
  contents: read

jobs:
  # Reuse the CI build + unit tests as a pre-release gate, mirroring the
  # Notesage release pipeline. A release never ships from a red build.
  tests:
    uses: ./.github/workflows/ci.yml

  create-release:
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: write # creates the GitHub release
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            // Flag alpha/beta/rc tags as prereleases so GitHub's
            // `releases/latest` resolver (used by the updater endpoint) keeps
            // pointing stable users at the latest stable build.
            const isPrerelease = /-(alpha|beta|rc)(\.|$)/.test(tag);
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `OpenScans ${tag}`,
              body: 'Release notes will be updated after builds complete.',
              draft: true,
              prerelease: isPrerelease
            })
            return data.id

  build-tauri:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # macOS (Intel)
            args: '--target x86_64-apple-darwin'
          - platform: 'macos-latest' # macOS (Apple Silicon)
            args: '--target aarch64-apple-darwin'
          - platform: 'ubuntu-22.04' # Linux
            args: ''
          - platform: 'windows-latest' # Windows
            args: ''

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write # tauri-action uploads build assets to the release
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS universal build requires both targets
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Build the self-contained llama-server sidecar from source (static, so
      # it's a single signable binary — tauri-action signs it as the
      # externalBin). Cached per target+version so repeat releases skip the
      # compile and the one-time Metal toolchain download on macOS.
      - name: Resolve sidecar target triple
        id: sidecar
        if: matrix.platform != 'windows-latest'
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == macos-* ]]; then
            TRIPLE=$(echo "${{ matrix.args }}" | sed -n 's/.*--target \([^ ]*\).*/\1/p')
          else
            TRIPLE=x86_64-unknown-linux-gnu
          fi
          echo "triple=$TRIPLE" >> "$GITHUB_OUTPUT"

      - name: Cache llama-server sidecar
        id: cache-sidecar
        if: matrix.platform != 'windows-latest'
        uses: actions/cache@v4
        with:
          path: src-tauri/binaries/llama-server-${{ steps.sidecar.outputs.triple }}
          key: llama-server-${{ steps.sidecar.outputs.triple }}-${{ hashFiles('src-tauri/binaries/LLAMA_CPP_VERSION', 'scripts/build-llama-server.sh') }}

      - name: Build llama-server sidecar
        if: matrix.platform != 'windows-latest' && steps.cache-sidecar.outputs.cache-hit != 'true'
        shell: bash
        run: ./scripts/build-llama-server.sh "" "${{ steps.sidecar.outputs.triple }}"

      - name: Update version from tag and configure signing
        shell: bash
        env:
          # Only used to decide whether to emit (signed) updater artifacts.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          # Extract version from tag (remove 'v' prefix)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Building version $VERSION from tag $GITHUB_REF"

          # Update package.json
          sed "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" package.json > package.json.tmp && mv package.json.tmp package.json

          # Update tauri.conf.json (first "version" field on its own line)
          sed "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp && mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json

          # Update Cargo.toml
          sed "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml > src-tauri/Cargo.toml.tmp && mv src-tauri/Cargo.toml.tmp src-tauri/Cargo.toml

          # Enable signed updater artifacts ONLY when the update-signing key is
          # configured as a secret. Without it the build still succeeds — it just
          # produces unsigned installers and no latest.json (no auto-update).
          if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            sed 's/"createUpdaterArtifacts": false/"createUpdaterArtifacts": true/' src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp && mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json
            echo "Update signing key present -> emitting signed updater artifacts (latest.json)."
          else
            echo "No TAURI_SIGNING_PRIVATE_KEY secret -> building without updater artifacts."
          fi

          echo "Updated config files to version $VERSION"
          grep '"version"' package.json | head -1
          grep '"version"' src-tauri/tauri.conf.json | head -1
          grep '^version' src-tauri/Cargo.toml
          grep 'createUpdaterArtifacts' src-tauri/tauri.conf.json

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing & notarization. ENABLE_CODE_SIGNING is empty when
          # the cert secret is unset, so tauri-action skips signing and the build
          # still succeeds (unsigned — users right-click -> Open on first launch).
          ENABLE_CODE_SIGNING: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # Tauri update signing. When unset, createUpdaterArtifacts was left
          # false above, so no signing is attempted.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          # tagName/releaseName intentionally omitted: passing them alongside
          # releaseId makes tauri-action attempt a second createRelease for the
          # same tag. releaseId alone is enough to upload the build assets.
          args: ${{ matrix.args }}

  publish-release:
    needs: [create-release, build-tauri]
    runs-on: ubuntu-latest
    permissions:
      contents: write # flips the draft release to published

    steps:
      - name: Publish Release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false
            })
